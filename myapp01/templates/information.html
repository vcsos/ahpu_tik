{% extends 'layout.html' %}
{% load static %}
{#-----------------------舆情数据统计----------------------------#}
{% block css %}
    <link rel="stylesheet" href="{% static 'css/hot_in.css' %}">
    <style>
        .dataTable tr:hover {
            background-color: #dee2e6;
        }
    </style>
{% endblock %}

{% block content %}
    <h1>热门视频评论数据</h1>
    <div style="margin: 20px 0; display: flex; align-items: center;">
        <label for="hotspotSelect">选择热搜话题：</label>
        <select id="hotspotSelect" onchange="switchHotspotData()">
            <option value="0">科目三舞蹈挑战</option>
            <option value="1">尔滨的讨好型市格</option>
            <option value="2">繁花爷叔同款美食</option>
        </select>
    </div>

    <table id="dataTable" class="dataTable">
        <thead>
        <tr>
            <th>用户昵称</th>
            <th>评论内容</th>
            <th>点赞数</th>
            <th>发布时间</th>
            <th>IP属地</th>
            <th>情感分类</th>
        </tr>
        </thead>
        <tbody>
        <!-- 数据将在这里动态插入 -->
        </tbody>
    </table>
{% endblock %}

                    location: "浙江",
                    emotion: "积极"
                }
            ]
        ];


        function renderTable(data) {
            const tbody = document.querySelector("#dataTable tbody");
            tbody.innerHTML = "";

            data.forEach(item => {
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${item.user}</td>
                    <td>${item.comment}</td>
                    <td>${formatLikes(item.likes)}</td>
                    <td>${item.time}</td>
                    <td>${item.location}</td>
                    <td>${item.emotion}</td>
                `;
                tbody.appendChild(row);
            });
        }

        // 抖音特色数据格式化
        function formatLikes(likes) {
            return likes >= 1 ? `${likes.toFixed(1)}w` : `${(likes * 1000).toFixed(0)}`;
        }

        function formatNumber(num) {
            return num >= 10000 ? `${(num / 10000).toFixed(1)}w` : num;
        }

        function switchHotspotData() {
            const select = document.getElementById("hotspotSelect");
            renderTable(hotspotData[select.value]);
        }

        // 初始化显示第一个热搜数据
        renderTable(hotspotData[0]);
    </script>
{% endblock %}
