{% extends 'layout.html' %}
{% load static %}

{% block css %}
<link rel="stylesheet" href="{% static 'css/style.css' %}">
{% endblock %}

{% block content %}
    <h1>热搜话题可视化</h1>
    <div>
        <div style="margin: 20px 0; display: flex; align-items: center;">
            <label for="topicSelect">选择热搜话题：</label>
            <select id="topicSelect" onchange="switchTopicData()">
                <option value="0">#科目三舞蹈挑战</option>
                <option value="1">#国产剧安利大赛</option>
                <option value="2">#春节返乡见闻</option>
            </select>
        </div>

        <!-- 点赞和评论图同一行 -->
        <div style="display: flex; justify-content: space-between; margin-bottom: 40px;">
            <div class="chart-container" style="width: 48%;">
                <div class="chart-icons">
                    <img src="https://img.icons8.com/ios/50/000000/refresh--v1.png" onclick="refreshChart(likesChart)"
                         alt="刷新">
                    <img src="https://img.icons8.com/ios/50/000000/download--v1.png" onclick="downloadChart(likesChart)"
                         alt="下载">
                    <img src="https://img.icons8.com/ios/50/000000/bar-chart.png"
                         onclick="changeToBarChart(likesChart)" alt="改为柱状图">
                </div>
                <div id="likesChart" style="width: 100%; height: 360px;"></div>
            </div>
            <div class="chart-container" style="width: 48%;">
                <div class="chart-icons">
                    <img src="https://img.icons8.com/ios/50/000000/refresh--v1.png"
                         onclick="refreshChart(commentsChart)" alt="刷新">
                    <img src="https://img.icons8.com/ios/50/000000/download--v1.png"
                         onclick="downloadChart(commentsChart)" alt="下载">
                    <img src="https://img.icons8.com/ios/50/000000/line-chart--v1.png"
                         onclick="changeToLineChart(commentsChart)" alt="改为折线图">
                </div>
                <div id="commentsChart" style="width: 100%; height: 360px;"></div>
            </div>
        </div>

        <!-- 收藏和转发图 -->
        <div class="chart-container">
            <div class="chart-icons">
                <img src="https://img.icons8.com/ios/50/000000/refresh--v1.png" onclick="refreshChart(collectionsChart)"
                     alt="刷新">
                <img src="https://img.icons8.com/ios/50/000000/download--v1.png"
                     onclick="downloadChart(collectionsChart)" alt="下载">
                <img src="https://img.icons8.com/ios/50/000000/line-chart--v1.png"
                     onclick="changeToLineChart(collectionsChart)" alt="改为折线图">
            </div>
            <div id="collectionsChart" style="width: 100%; height: 360px;"></div>
        </div>
        <div class="chart-container">
            <div class="chart-icons">
                <img src="https://img.icons8.com/ios/50/000000/refresh--v1.png" onclick="refreshChart(repostsChart)"
                     alt="刷新">
                <img src="https://img.icons8.com/ios/50/000000/download--v1.png" onclick="downloadChart(repostsChart)"
                     alt="下载">
                <img src="https://img.icons8.com/ios/50/000000/line-chart--v1.png"
                     onclick="changeToLineChart(repostsChart)" alt="改为折线图">
            </div>
            <div id="repostsChart" style="width: 100%; height: 360px;"></div>
        </div>
    </div>
{% endblock %}

{% block js %}
    <script>
        // 初始化图表
        const likesChart = echarts.init(document.getElementById('likesChart'));
        const commentsChart = echarts.init(document.getElementById('commentsChart'));
        const collectionsChart = echarts.init(document.getElementById('collectionsChart'));
        const repostsChart = echarts.init(document.getElementById('repostsChart'));

        // 模拟数据（实际使用时需要替换为真实数据）
        const topicsData = [
            { // 科目三舞蹈挑战
                likes: createOption('点赞量区间分布 - 科目三舞蹈挑战', [65, 120, 210, 85], 'line'),
                comments: createOption('评论量区间分布 - 科目三舞蹈挑战', [90, 150, 180, 60], 'bar'),
                collections: createOption('收藏量区间分布 - 科目三舞蹈挑战', [80, 110, 160, 130], 'bar'),
                reposts: createHorizontalOption('转发量区间分布 - 科目三舞蹈挑战', [45, 95, 230, 110])
            },
            { // 国产剧安利大赛
                likes: createOption('点赞量区间分布 - 国产剧安利大赛', [40, 160, 190, 90], 'line'),
                comments: createOption('评论量区间分布 - 国产剧安利大赛', [75, 130, 200, 85], 'bar'),
                collections: createOption('收藏量区间分布 - 国产剧安利大赛', [60, 140, 170, 120], 'bar'),
                reposts: createHorizontalOption('转发量区间分布 - 国产剧安利大赛', [55, 110, 210, 115])
            },
            { // 春节返乡见闻
                likes: createOption('点赞量区间分布 - 春节返乡见闻', [85, 140, 180, 75], 'line'),
                comments: createOption('评论量区间分布 - 春节返乡见闻', [70, 160, 170, 90], 'bar'),
                collections: createOption('收藏量区间分布 - 春节返乡见闻', [90, 120, 200, 100], 'bar'),
                reposts: createHorizontalOption('转发量区间分布 - 春节返乡见闻', [60, 130, 190, 110])
            }
        ];

        // 创建通用配置项（支持折线图和柱状图）
        function createOption(title, data, type = 'bar') {
            return {
                title: {text: title, left: 'center'},
                tooltip: {trigger: 'axis'},
                xAxis: {
                    type: 'category',
                    data: ['0-100', '101-500', '501-1000', '1000+'],
                    axisLabel: {fontSize: 14}
                },
                yAxis: {
                    type: 'value',
                    axisLabel: {fontSize: 14}
                },
                series: [{
                    name: '视频数量',
                    type: type,
                    data: data,
                    itemStyle: {
                        color: type === 'bar'
                            ? new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                {offset: 0, color: '#83bff6'},
                                {offset: 1, color: '#007BFF'}
                            ])
                            : '#67E0E3'
                    },
                    lineStyle: {
                        width: 3
                    },
                    barWidth: '30%'
                }],
                grid: {containLabel: true, top: 80}
            };
        }

        // 创建横向柱状图配置项
        function createHorizontalOption(title, data) {
            return {
                title: {text: title, left: 'center'},
                tooltip: {trigger: 'axis'},
                yAxis: {
                    type: 'category',
                    data: ['0-100', '101-500', '501-1000', '1000+'],
                    axisLabel: {fontSize: 14}
                },
                xAxis: {
                    type: 'value',
                    axisLabel: {fontSize: 14}
                },
                series: [{
                    name: '文章数量',
                    type: 'bar',
                    data: data,
                    itemStyle: {
                        color: new echarts.graphic.LinearGradient(1, 0, 0, 0, [
                            {offset: 0, color: '#83bff6'},
                            {offset: 1, color: '#007BFF'}
                        ])
                    },
                    barWidth: '60%'
                }],
                grid: {containLabel: true, top: 80}
            };
        }

        // 切换话题数据
        function switchTopicData() {
            const selected = document.getElementById('topicSelect').value;
            const data = topicsData[selected];

            likesChart.setOption(data.likes);
            commentsChart.setOption(data.comments);
            collectionsChart.setOption(data.collections);
            repostsChart.setOption(data.reposts);
        }

        // 刷新图表
        function refreshChart(chart) {
            switchTopicData();
            chart.resize();
        }

        // 下载图表
        function downloadChart(chart) {
            const a = document.createElement('a');
            a.href = chart.getDataURL({ type: 'png', pixelRatio: 2 });
            a.download = 'chart.png';
            a.click();
        }

        // 改为折线图
        function changeToLineChart(chart) {
            const option = chart.getOption();
            option.series[0].type = 'line';
            option.series[0].itemStyle = { color: '#67E0E3' };
            chart.setOption(option);
        }

        // 改为柱状图
        function changeToBarChart(chart) {
            const option = chart.getOption();
            option.series[0].type = 'bar';
            option.series[0].itemStyle = {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                    {offset: 0, color: '#83bff6'},
                    {offset: 1, color: '#007BFF'}
                ])
            };
            chart.setOption(option);
        }

        // 初始化默认显示
        window.addEventListener('DOMContentLoaded', () => {
            switchTopicData();
            window.addEventListener('resize', () => {
                likesChart.resize();
                commentsChart.resize();
                collectionsChart.resize();
                repostsChart.resize();
            });
        });
    </script>
{% endblock %}
